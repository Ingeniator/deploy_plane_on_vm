services:
  plane-aio:
    image: ${REGISTRY}/makeplane/plane-aio-community:${APP_RELEASE:-stable}
    restart: always
    env_file: .env
    ports:
      - "${LISTEN_HTTP_PORT:-8080}:80"
      - "${LISTEN_HTTPS_PORT:-8443}:443"
    volumes:
      - type: bind
        source: ${DATA_DIR}/aio/data
        target: /app/data
      - type: bind
        source: ${DATA_DIR}/aio/logs
        target: /app/logs
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-minio:
        condition: service_started

  plane-db:
    image: ${REGISTRY}/postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plane}
      POSTGRES_DB: ${POSTGRES_DB:-plane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - type: bind
        source: ${DATA_DIR}/pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plane} -d ${POSTGRES_DB:-plane}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  plane-redis:
    image: ${REGISTRY}/valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - type: bind
        source: ${DATA_DIR}/redis
        target: /data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  plane-mq:
    image: ${REGISTRY}/rabbitmq:3.13.6-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
    volumes:
      - type: bind
        source: ${DATA_DIR}/rabbitmq
        target: /var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  plane-minio:
    image: ${REGISTRY}/minio/minio:latest
    restart: always
    command: server /export --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
    volumes:
      - type: bind
        source: ${DATA_DIR}/minio
        target: /export
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
